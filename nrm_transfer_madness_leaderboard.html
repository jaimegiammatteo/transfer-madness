<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NRM TRANSFER MADNESS 2026 — LEADERBOARD</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#07070F; --panel:#0F0F1C; --panel2:#15152A; --border:#1E1E35;
  --orange:#FF6B00; --gold:#FFB800; --blue:#0A84FF; --green:#30D158;
  --red:#FF2D55; --text:#EEEEF5; --muted:#555575;
  --teamA:#FF6B00; --teamB:#0A84FF;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Barlow Condensed',sans-serif;height:100vh;width:100vw;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 50% 60% at 15% 50%,rgba(255,107,0,0.06) 0%,transparent 70%),
  radial-gradient(ellipse 50% 60% at 85% 50%,rgba(10,132,255,0.06) 0%,transparent 70%);}
.grid{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:0.02;
  background-image:linear-gradient(var(--orange) 1px,transparent 1px),linear-gradient(90deg,var(--orange) 1px,transparent 1px);
  background-size:52px 52px;}
.app{position:relative;z-index:1;display:flex;flex-direction:column;height:100vh;padding:16px 20px 12px;gap:12px;}

.header{display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:relative;padding-bottom:10px;}
.header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--teamA),var(--gold),var(--teamB));}
.h-left{display:flex;align-items:center;gap:10px;}
.ball{font-size:2rem;animation:spin 5s linear infinite;display:inline-block;}
@keyframes spin{to{transform:rotate(360deg);}}
.h-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(1.8rem,3vw,3rem);letter-spacing:4px;line-height:1;
  background:linear-gradient(135deg,var(--orange),var(--gold),#fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.h-sub{font-size:0.65rem;letter-spacing:3px;color:var(--muted);text-transform:uppercase;}

.sync-status{font-size:0.6rem;letter-spacing:2px;padding:3px 8px;border-radius:10px;border:1px solid var(--border);color:var(--muted);}
.sync-status.ok{border-color:rgba(48,209,88,0.4);color:var(--green);}
.sync-status.loading{border-color:rgba(255,184,0,0.4);color:var(--gold);animation:blink 1s ease-in-out infinite;}
.sync-status.err{border-color:rgba(255,45,85,0.4);color:var(--red);}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.4}}

.team-totals{display:flex;align-items:center;gap:12px;}
.total-card{display:flex;flex-direction:column;align-items:center;border-radius:10px;padding:6px 20px;position:relative;overflow:hidden;border:1px solid var(--border);min-width:160px;}
.total-card.A{border-color:rgba(255,107,0,0.5);background:rgba(255,107,0,0.07);}
.total-card.B{border-color:rgba(10,132,255,0.5);background:rgba(10,132,255,0.07);}
.total-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.total-card.A::before{background:var(--teamA);}
.total-card.B::before{background:var(--teamB);}
.tc-name{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:3px;}
.total-card.A .tc-name{color:var(--teamA);}
.total-card.B .tc-name{color:var(--teamB);}
.tc-num{font-family:'Bebas Neue',sans-serif;font-size:2.5rem;line-height:1;}
.tc-lbl{font-size:0.55rem;letter-spacing:2px;color:var(--muted);}
.vs-badge{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;color:var(--gold);letter-spacing:2px;}

.teams-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;flex:1;min-height:0;}
.team-col{display:flex;flex-direction:column;gap:8px;min-height:0;}
.team-col-header{display:flex;align-items:center;justify-content:space-between;border-radius:10px;padding:10px 16px;flex-shrink:0;position:relative;overflow:hidden;}
.team-col-header.A{background:rgba(255,107,0,0.1);border:1px solid rgba(255,107,0,0.4);}
.team-col-header.B{background:rgba(10,132,255,0.1);border:1px solid rgba(10,132,255,0.4);}
.team-col-header::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.team-col-header.A::before{background:var(--teamA);}
.team-col-header.B::before{background:var(--teamB);}
.tch-name{font-family:'Bebas Neue',sans-serif;font-size:clamp(1.4rem,2.5vw,2.5rem);letter-spacing:4px;}
.team-col-header.A .tch-name{color:var(--teamA);}
.team-col-header.B .tch-name{color:var(--teamB);}
.tch-total{font-family:'Bebas Neue',sans-serif;font-size:clamp(1.8rem,3vw,3rem);}
.tch-lbl{font-size:0.6rem;letter-spacing:2px;color:var(--muted);}

.rep-list{display:flex;flex-direction:column;gap:5px;flex:1;overflow:hidden;}
.rep-row{display:flex;align-items:center;gap:10px;background:var(--panel);border-radius:8px;padding:8px 14px;border:1px solid var(--border);flex-shrink:0;position:relative;overflow:hidden;}
.rep-row.top-rep{border-color:var(--gold);background:rgba(255,184,0,0.05);}
.rep-rank{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:var(--muted);min-width:28px;text-align:center;}
.rep-bar-wrap{flex:1;display:flex;flex-direction:column;gap:3px;}
.rep-name-row{display:flex;align-items:center;justify-content:space-between;}
.rep-name{font-size:clamp(1rem,1.8vw,1.6rem);font-weight:700;letter-spacing:0.5px;line-height:1;}
.rep-score{font-family:'Bebas Neue',sans-serif;font-size:clamp(1.2rem,2vw,1.8rem);}
.rep-row.A .rep-score{color:var(--teamA);}
.rep-row.B .rep-score{color:var(--teamB);}
.rep-row.top-rep .rep-score{color:var(--gold);}
.bar-bg{height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.bar-fill{height:100%;border-radius:2px;transition:width 1s ease;}
.bar-fill.A{background:linear-gradient(90deg,var(--teamA),var(--gold));}
.bar-fill.B{background:linear-gradient(90deg,var(--teamB),#00C8FF);}
.crown{font-size:0.9rem;margin-left:4px;}

.fa-section{flex-shrink:0;}
.fa-header{display:flex;align-items:center;justify-content:space-between;background:rgba(255,184,0,0.07);border:1px solid rgba(255,184,0,0.25);border-radius:8px;padding:6px 14px;}
.fa-title{font-family:'Bebas Neue',sans-serif;font-size:0.9rem;letter-spacing:3px;color:var(--gold);}
.fa-reps{display:flex;gap:16px;flex-wrap:wrap;}
.fa-name{font-size:0.9rem;font-weight:700;}
.fa-score{font-family:'Bebas Neue',sans-serif;font-size:1rem;color:var(--gold);margin-left:8px;}

.bottom-bar{display:flex;align-items:center;justify-content:space-between;padding:5px 0;flex-shrink:0;border-top:1px solid var(--border);}
.bb-hint{font-size:0.6rem;letter-spacing:2px;color:var(--muted);}
.bb-brick{font-size:0.65rem;letter-spacing:2px;color:var(--red);}
.bb-right{font-size:0.6rem;letter-spacing:2px;color:var(--muted);text-align:right;}

.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:200;align-items:center;justify-content:center;}
.overlay.open{display:flex;}
.modal{background:var(--panel2);border:1px solid var(--gold);border-radius:12px;padding:24px;width:300px;}
.modal h2{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:2px;color:var(--gold);margin-bottom:14px;}
.ig{margin-bottom:10px;}
.ig label{display:block;font-size:0.65rem;letter-spacing:2px;color:var(--muted);margin-bottom:4px;}
.ig input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px 10px;color:var(--text);font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:2px;}
.ig input:focus{outline:none;border-color:var(--gold);}
.mbtns{display:flex;gap:8px;margin-top:14px;}
.btn{flex:1;padding:9px;border:none;border-radius:6px;font-family:'Bebas Neue',sans-serif;font-size:0.9rem;letter-spacing:2px;cursor:pointer;transition:opacity 0.2s;}
.btn:hover{opacity:0.8;}
.btn-p{background:var(--gold);color:#000;}
.btn-s{background:var(--border);color:var(--muted);}
.names-btn{position:fixed;bottom:10px;left:10px;z-index:50;background:var(--panel);border:1px solid var(--border);color:var(--muted);font-family:'Bebas Neue',sans-serif;letter-spacing:2px;font-size:0.7rem;padding:5px 11px;border-radius:5px;cursor:pointer;transition:all 0.2s;}
.names-btn:hover{border-color:var(--gold);color:var(--gold);}
.refresh-btn{position:fixed;bottom:10px;right:10px;z-index:50;background:var(--panel);border:1px solid var(--border);color:var(--muted);font-family:'Bebas Neue',sans-serif;letter-spacing:2px;font-size:0.7rem;padding:5px 11px;border-radius:5px;cursor:pointer;transition:all 0.2s;}
.refresh-btn:hover{border-color:var(--green);color:var(--green);}
</style>
</head>
<body>
<div class="grid"></div>

<div class="overlay" id="nameOverlay">
  <div class="modal">
    <h2>🏀 TEAM NAMES</h2>
    <div class="ig"><label style="color:var(--teamA)">🟠 TEAM A NAME</label><input id="nameA" type="text" placeholder="TEAM A" maxlength="14"></div>
    <div class="ig"><label style="color:var(--teamB)">🔵 TEAM B NAME</label><input id="nameB" type="text" placeholder="TEAM B" maxlength="14"></div>
    <div class="mbtns">
      <button class="btn btn-s" onclick="closeNames()">CANCEL</button>
      <button class="btn btn-p" onclick="saveNames()">SAVE</button>
    </div>
  </div>
</div>

<div class="app">
  <div class="header">
    <div class="h-left">
      <span class="ball">🏀</span>
      <div>
        <div class="h-title">NRM TRANSFER MADNESS <span style="font-size:0.5em;color:var(--gold)">2026</span></div>
        <div class="h-sub">TEAM LEADERBOARD · NRM · AUTO-REFRESHES EVERY 60 SECONDS</div>
      </div>
    </div>
    <div class="team-totals">
      <div class="total-card A">
        <div class="tc-name" id="tcNameA">TEAM A</div>
        <div class="tc-num" id="tcNumA">—</div>
        <div class="tc-lbl">TOTAL XFERS</div>
      </div>
      <div class="vs-badge">VS</div>
      <div class="total-card B">
        <div class="tc-name" id="tcNameB">TEAM B</div>
        <div class="tc-num" id="tcNumB">—</div>
        <div class="tc-lbl">TOTAL XFERS</div>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
      <div id="syncStatus" class="sync-status loading">⟳ LOADING...</div>
      <div id="hDate" style="font-size:0.7rem;color:var(--muted);letter-spacing:1px"></div>
    </div>
  </div>

  <div class="teams-grid">
    <div class="team-col" id="teamACol">
      <div style="display:flex;align-items:center;justify-content:center;flex:1;color:var(--muted);font-family:'Bebas Neue',sans-serif;letter-spacing:3px;font-size:1rem">LOADING...</div>
    </div>
    <div class="team-col" id="teamBCol">
      <div style="display:flex;align-items:center;justify-content:center;flex:1;color:var(--muted);font-family:'Bebas Neue',sans-serif;letter-spacing:3px;font-size:1rem">LOADING...</div>
    </div>
  </div>

  <div class="fa-section" id="faSection"></div>

  <div class="bottom-bar">
    <div class="bb-hint">UPDATE SCORES IN GOOGLE SHEETS · ALL SCREENS AUTO-REFRESH EVERY 60 SECONDS</div>
    <div class="bb-brick" id="brickDisplay"></div>
    <div class="bb-right">
      <div id="lastSync">LAST SYNC: —</div>
      <div id="bbDate"></div>
    </div>
  </div>
</div>

<button class="names-btn" onclick="openNames()">✏️ TEAM NAMES</button>
<button class="refresh-btn" onclick="fetchData()">⟳ REFRESH NOW</button>

<script>
const SHEET_ID='14eA2xm43CQY0FRiqX2zWCQD00pD-PoaeGRpm8Hl7q5U';
const SHEET1_URL=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Sheet1`;

function parseGViz(text){
  const json=text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/);
  if(!json)return[];
  const data=JSON.parse(json[1]);
  const results=[];
  data.table.rows.forEach(row=>{
    if(!row.c||!row.c[0]||!row.c[0].v)return;
    results.push(row.c.map(cell=>cell?(cell.v!==null?cell.v:''):''));
  });
  return results;
}

let names={A:'TEAM A',B:'TEAM B'};
let repsData=[];

function loadNames(){try{const s=localStorage.getItem('nrm_lb_names');if(s)names=JSON.parse(s);}catch(e){}}
function saveNames_(){try{localStorage.setItem('nrm_lb_names',JSON.stringify(names));}catch(e){}}

async function fetchData(){
  const status=document.getElementById('syncStatus');
  status.className='sync-status loading';status.textContent='⟳ SYNCING...';
  try{
    const res=await fetch(SHEET1_URL);
    if(!res.ok)throw new Error('fetch failed');
    const text=await res.text();
    const rows=parseGViz(text);
    repsData=rows.map(r=>({
      name:String(r[0]).trim(),
      team:String(r[1]).trim().toUpperCase(),
      xfers:Number(r[2])||0
    })).filter(r=>r.name);
    status.className='sync-status ok';status.textContent='✓ LIVE';
    document.getElementById('lastSync').textContent='LAST SYNC: '+new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
    renderAll();
  }catch(e){
    status.className='sync-status err';status.textContent='✗ SYNC ERROR — RETRYING';
  }
}

function renderAll(){
  const teamA=repsData.filter(r=>r.team==='A');
  const teamB=repsData.filter(r=>r.team==='B');
  const floaters=repsData.filter(r=>r.team==='F');
  const sortedA=[...teamA].sort((a,b)=>b.xfers-a.xfers);
  const sortedB=[...teamB].sort((a,b)=>b.xfers-a.xfers);
  const totalA=teamA.reduce((s,r)=>s+r.xfers,0);
  const totalB=teamB.reduce((s,r)=>s+r.xfers,0);
  const maxScore=Math.max(...repsData.map(r=>r.xfers),1);

  document.getElementById('tcNameA').textContent=names.A;
  document.getElementById('tcNameB').textContent=names.B;
  document.getElementById('tcNumA').textContent=totalA;
  document.getElementById('tcNumB').textContent=totalB;
  document.getElementById('hDate').textContent=new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}).toUpperCase();
  document.getElementById('bbDate').textContent=new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});

  buildTeamCol('teamACol',names.A,'A',sortedA,totalA,maxScore);
  buildTeamCol('teamBCol',names.B,'B',sortedB,totalB,maxScore);

  const fa=document.getElementById('faSection');
  if(floaters.length){
    fa.innerHTML=`<div class="fa-header"><span class="fa-title">⭐ FREE AGENT</span><div class="fa-reps">${
      floaters.map(r=>`<div class="fa-rep"><span class="fa-name">${r.name}</span><span class="fa-score">${r.xfers}</span></div>`).join('')
    }</div></div>`;
  }else fa.innerHTML='';

  const allReps=repsData.filter(r=>r.team!=='F');
  if(allReps.length){
    const sorted=[...allReps].sort((a,b)=>a.xfers-b.xfers);
    const brick=sorted[0];
    document.getElementById('brickDisplay').textContent=`🧱 BRICK AWARD: ${brick.name.toUpperCase()} (${brick.xfers} XFERS)`;
  }
}

function buildTeamCol(id,name,team,reps,total,maxScore){
  const col=document.getElementById(id);
  const medals=['🥇','🥈','🥉'];
  let html=`
    <div class="team-col-header ${team}">
      <div>
        <div class="tch-name">${team==='A'?'🟠':'🔵'} ${name}</div>
        <div class="tch-lbl">TOTAL XFERS</div>
      </div>
      <div class="tch-total">${total}</div>
    </div>
    <div class="rep-list">`;
  reps.forEach((r,i)=>{
    const pct=maxScore>0?Math.round((r.xfers/maxScore)*100):0;
    const isTop=i===0&&r.xfers>0;
    const medal=medals[i]||(i+1);
    html+=`
      <div class="rep-row ${team}${isTop?' top-rep':''}">
        <div class="rep-rank">${medal}</div>
        <div class="rep-bar-wrap">
          <div class="rep-name-row">
            <span class="rep-name">${r.name}${isTop?'<span class="crown">👑</span>':''}</span>
            <span class="rep-score">${r.xfers}</span>
          </div>
          <div class="bar-bg"><div class="bar-fill ${team}" style="width:${pct}%"></div></div>
        </div>
      </div>`;
  });
  html+='</div>';
  col.innerHTML=html;
}

function openNames(){document.getElementById('nameA').value=names.A;document.getElementById('nameB').value=names.B;document.getElementById('nameOverlay').classList.add('open');}
function closeNames(){document.getElementById('nameOverlay').classList.remove('open');}
function saveNames(){
  const a=document.getElementById('nameA').value.trim().toUpperCase();
  const b=document.getElementById('nameB').value.trim().toUpperCase();
  if(a)names.A=a;if(b)names.B=b;
  saveNames_();closeNames();renderAll();
}

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeNames();});
loadNames();fetchData();
setInterval(fetchData,60000);
setInterval(()=>{document.getElementById('bbDate').textContent=new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});},60000);
</script>
</body>
</html>
